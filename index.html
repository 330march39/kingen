<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>KINGEN - 時代を超える言葉</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Firebase (Compat versions for synchronous loading to prevent blank screen errors) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <style>
    :root {
      --bg-color: #FDFDFB; /* 古い紙のような暖かみのある白 */
      --text-main: #2C2C2A;
      --text-muted: #8C8C85;
      --border-color: #EAE9E4;
    }
    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-color);
      color: var(--text-main);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    ::-webkit-scrollbar {
      width: 0px;
      background: transparent;
    }
    .whitespace-pre-wrap { white-space: pre-wrap; }
    
    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-up {
      animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .delay-100 { animation-delay: 100ms; }
    .delay-200 { animation-delay: 200ms; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useCallback } = React;

    // --- Firebase Setup & Mock Logic ---
    const configStr = typeof window.__firebase_config !== 'undefined' ? window.__firebase_config : null;
    let firebaseConfig = null;
    try {
      if (configStr && configStr !== "{}" && configStr !== "") {
        firebaseConfig = JSON.parse(configStr);
      }
    } catch(e) { console.error("Firebase config parse error", e); }

    const isFirebaseReady = !!(firebaseConfig && firebaseConfig.apiKey && firebaseConfig.apiKey !== "dummy");
    
    let app, auth, db;
    if (isFirebaseReady) {
      app = firebase.initializeApp(firebaseConfig);
      auth = firebase.auth();
      db = firebase.firestore();
    }

    const appId = typeof window.__app_id !== 'undefined' ? window.__app_id : 'default-kingen';

    // --- Icons ---
    const Icon = ({ children, className = "w-6 h-6", ...props }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>{children}</svg>
    );
    const HomeIcon = (p) => <Icon {...p}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></Icon>;
    const PenIcon = (p) => <Icon {...p}><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></Icon>;
    const UserIcon = (p) => <Icon {...p}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></Icon>;
    const HeartIcon = (p) => <Icon {...p}><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></Icon>;
    const ChevronLeftIcon = (p) => <Icon {...p}><path d="m15 18-6-6 6-6"/></Icon>;
    const BotIcon = (p) => <Icon {...p}><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></Icon>;
    const BookIcon = (p) => <Icon {...p}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></Icon>;
    const SettingsIcon = (p) => <Icon {...p}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></Icon>;
    const LoaderIcon = (p) => <Icon {...p} className={`animate-spin ${p.className || "w-6 h-6"}`}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></Icon>;
    const SearchIcon = (p) => <Icon {...p}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></Icon>;
    const Info = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></Icon>;
    const AlertCircle = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><path d="M12 8v4"/><path d="M12 16h.01"/></Icon>;
    const Languages = (p) => <Icon {...p}><path d="m5 8 6 6"/><path d="m4 14 6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="m22 22-5-10-5 10"/><path d="M14 18h6"/></Icon>;

    // --- Translations ---
    const i18n = {
      ja: {
        appName: 'KINGEN',
        subtitle: '時を超えた言葉が、現代に届く場所',
        loginBtn: '入場する',
        demoModeInfo: '※デモモードで動作中（設定でAPIキーを入れるとAIが動作します）',
        home: 'タイムライン',
        recommend: 'すべての記録',
        following: 'フォロー中',
        add: '記録する',
        mypage: '手記',
        settings: '設定',
        noPosts: 'まだ記録がありません。',
        postTitle: '言葉を記録する',
        wordPlaceholder: '歴史に刻まれた言葉を入力してください',
        authorPlaceholder: '発言者（例：ソクラテス）',
        checkBtn: 'AIで史実を確認し、美しく整える',
        checking: '記録を照合しています...',
        postNote: 'AIが歴史的文献に基づき言葉を検証・修正し、最も美しい形で改行を整えます。推測や現代人の日常会話は記録できません。',
        followBtn: 'フォロー',
        followingBtn: 'フォロー中',
        aiExp: 'AI 解説',
        episode: '深掘りエピソード',
        originalText: '英訳・原文',
        memberNo: '識者番号',
        myPosts: 'あなたの記録',
        fontSetting: 'フォント: ',
        langSetting: '言語: 日本語',
        authorProfileTitle: '人物録',
        keywordSearch: 'の検索結果',
        logout: '退出する'
      },
      en: {
        appName: 'KINGEN',
        subtitle: 'Where timeless words reach the present',
        loginBtn: 'Enter',
        demoModeInfo: '*Running in Demo Mode',
        home: 'Timeline',
        recommend: 'All Records',
        following: 'Following',
        add: 'Record',
        mypage: 'Journal',
        settings: 'Settings',
        noPosts: 'No records yet.',
        postTitle: 'Record a Quote',
        wordPlaceholder: 'Enter a historically significant quote',
        authorPlaceholder: 'Author (e.g. Socrates)',
        checkBtn: 'Verify & Format with AI',
        checking: 'Verifying records...',
        postNote: 'AI verifies the quote against historical texts, corrects it, and formats it beautifully. Modern casual comments are not allowed.',
        followBtn: 'Follow',
        followingBtn: 'Following',
        aiExp: 'AI Explanation',
        episode: 'Deep Dive Episode',
        originalText: 'Japanese Original',
        memberNo: 'Scholar No.',
        myPosts: 'Your Records',
        fontSetting: 'Font: ',
        langSetting: 'Language: English',
        authorProfileTitle: 'Biography',
        keywordSearch: ' Search Results',
        logout: 'Leave'
      }
    };

    // --- API Helpers ---
    const generateAIContent = async (prompt, schema) => {
      const response = await fetch('/api/gemini', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt, schema })
      });

      if (!response.ok) {
        // 返ってきたデータがJSONかどうかを確認
        const contentType = response.headers.get("content-type");
        if (contentType && contentType.includes("application/json")) {
          const errorData = await response.json();
          throw new Error(errorData.error || 'APIエラーが発生しました');
        } else {
          // JSON以外（HTMLエラーページなど）が返ってきた場合
          console.error("エラーレスポンス:", await response.text());
          throw new Error(`APIへの接続に失敗しました (Status: ${response.status})。APIエンドポイントの設定を確認してください。`);
        }
      }
      
      return await response.json();
    };

    // ▼ 引数から customApiKey を削除
    const checkWordWithAI = async (content, author) => {
      const prompt = `以下の言葉が、指定された発言者によって実際に言われたものか、歴史的文献や信頼できる記録に基づいているかを厳密に判定してください。
言葉: "${content}"
発言者: "${author}"

【重要要件】
1. 一般的な挨拶や推測の言葉は isValid: false にしてください。
2. 言葉が間違っている場合は、文献に残っている正確な言葉に修正してください。
3. 詩や名言として美しく読みやすくなるように、日本語と英語の両方において、適切な位置に改行(\\n)を含めてください。
4. 【言語要件】解説(explanation)とエピソード(episode)は、まず「日本語」で生成し、その後自然な「英語」に訳してそれぞれ指定のJSONキーに出力してください。`;

      const schema = {
        isValid: { type: "BOOLEAN" },
        reason: { type: "STRING" },
        ja_text: { type: "STRING" },
        en_text: { type: "STRING" },
        estimatedAge_relative: { type: "STRING" },
        estimatedAge_absolute: { type: "STRING" },
        explanation_ja: { type: "STRING" },
        explanation_en: { type: "STRING" },
        episode_ja: { type: "STRING" },
        episode_en: { type: "STRING" },
        authorKeywords: { type: "ARRAY", items: { type: "STRING" } }
      };

      // ▼ 呼び出し時にも customApiKey を渡さない
      return generateAIContent(prompt, schema);
    };
    
    // --- UI Components ---
    const AuthorAvatar = ({ name, size = 'md', onClick }) => {
      const initial = name ? name.charAt(0).toUpperCase() : '?';
      const sizeClasses = { sm: 'w-8 h-8 text-xs', md: 'w-12 h-12 text-lg', lg: 'w-20 h-20 text-3xl' };
      return (
        <div 
          onClick={(e) => { if(onClick) { e.stopPropagation(); onClick(name); } }}
          className={`${sizeClasses[size]} rounded-full bg-[#2C2C2A] text-white flex items-center justify-center font-serif flex-shrink-0 ${onClick ? 'cursor-pointer hover:bg-black transition-colors' : ''} shadow-sm`}
        >
          {initial}
        </div>
      );
    };

    const AgeDisplay = ({ relative, absolute }) => {
      const [showAbsolute, setShowAbsolute] = useState(false);
      if (!relative && !absolute) return null;
      return (
        <span 
          onClick={(e) => { e.stopPropagation(); setShowAbsolute(!showAbsolute); }}
          className="text-xs font-sans text-[#8C8C85] whitespace-nowrap ml-3 bg-white px-3 py-1 rounded-full border border-[#EAE9E4] cursor-pointer hover:bg-[#F4F3EF] transition-colors select-none"
          title="タップで年代表示を切り替え"
        >
          {showAbsolute ? (absolute || relative) : (relative || absolute)}
        </span>
      );
    };

    // --- Main App Component ---
    function App() {
      const [authUser, setAuthUser] = useState(null);
      const [userProfile, setUserProfile] = useState(null);
      const [posts, setPosts] = useState([]);
      
      const [currentTab, setCurrentTab] = useState('home'); // home, add, profile, settings
      const [activePost, setActivePost] = useState(null);
      const [activeAuthor, setActiveAuthor] = useState(null); 
      const [activeKeyword, setActiveKeyword] = useState(null);
      
      const [isInitializing, setIsInitializing] = useState(true);

      // Initialization
      useEffect(() => {
        if (!isFirebaseReady) {
          alert("Firebaseの設定が見つかりません。システムを起動できません。");
          setIsInitializing(false);
          return;
        }

        // Real Firebase Auth
        const initAuth = async () => {
          try {
            if (typeof window.__initial_auth_token !== 'undefined' && window.__initial_auth_token) {
              await auth.signInWithCustomToken(window.__initial_auth_token);
            } else {
              await auth.signInAnonymously();
            }
          } catch (error) {
            console.error("Auth init failed:", error);
            alert("データベースへの接続に失敗しました。");
            setIsInitializing(false);
          }
        };
        initAuth();

        const unsubscribe = auth.onAuthStateChanged((user) => {
          setAuthUser(user);
          if (!user) setIsInitializing(false);
        });
        return () => unsubscribe();
      }, []);

      // Data Fetching (Real)
      useEffect(() => {
        if (!authUser) return;
        const profileRef = db.collection('artifacts').doc(appId).collection('users').doc(authUser.uid).collection('profile').doc('data');
        const unsubP = profileRef.onSnapshot(doc => {
          setUserProfile(doc.exists ? doc.data() : null);
          setIsInitializing(false);
        });

        const postsRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('posts');
        const unsubPosts = postsRef.onSnapshot(snap => {
          const postsData = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          postsData.sort((a, b) => b.createdAt - a.createdAt);
          setPosts(postsData);
        });

        return () => { unsubP(); unsubPosts(); };
      }, [authUser, mockMode]);

      // Actions
      const toggleLike = async (postId, likedBy) => {
        if (!authUser || !userProfile) return;
        const isLiked = likedBy.includes(authUser.uid);
        let newLikedBy = isLiked ? likedBy.filter(id => id !== authUser.uid) : [...likedBy, authUser.uid];

        if (mockMode) {
          globalMockPosts = globalMockPosts.map(p => p.id === postId ? { ...p, likedBy: newLikedBy, likes: newLikedBy.length } : p);
          setPosts([...globalMockPosts]);
        } else {
          await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('posts').doc(postId).update({ likes: newLikedBy.length, likedBy: newLikedBy });
        }
      };

      const toggleFollowAuthor = async (authorName) => {
        if (!authUser || !userProfile) return;
        let newFollowing = [...(userProfile.followedAuthors || [])];
        if (newFollowing.includes(authorName)) {
          newFollowing = newFollowing.filter(name => name !== authorName);
        } else {
          newFollowing.push(authorName);
        }

        if (mockMode) {
          setUserProfile({ ...userProfile, followedAuthors: newFollowing });
        } else {
          await db.collection('artifacts').doc(appId).collection('users').doc(authUser.uid).collection('profile').doc('data').update({ followedAuthors: newFollowing });
        }
      };

      const updateProfile = async (updates) => {
        if (!authUser) return;
        if (mockMode) {
          setUserProfile({ ...userProfile, ...updates });
        } else {
          await db.collection('artifacts').doc(appId).collection('users').doc(authUser.uid).collection('profile').doc('data').update(updates);
        }
      };

      const addPost = async (postData) => {
        if (mockMode) {
          const newPost = { ...postData, id: 'm' + Date.now() };
          globalMockPosts = [newPost, ...globalMockPosts];
          setPosts([...globalMockPosts]);
        } else {
          await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('posts').add(postData);
        }
      };

      const handleLogout = async () => {
        await auth.signOut();
        setAuthUser(null);
        setUserProfile(null);
        setIsInitializing(false);
      };

      if (isInitializing) {
        return (
          <div className="flex flex-col items-center justify-center h-screen bg-[#FDFDFB]">
             <span className="text-2xl font-serif tracking-[0.3em] text-[#2C2C2A] animate-pulse">KINGEN</span>
          </div>
        );
      }

      const fontClass = userProfile?.fontPreference === 'sans' ? 'font-sans' : 'font-serif';
      const lang = userProfile?.appLanguage || 'ja';
      const t = i18n[lang];

      const renderScreen = () => {
        if (activeKeyword) {
          return (
            <KeywordScreen 
              keyword={activeKeyword} 
              posts={posts} 
              onBack={() => setActiveKeyword(null)} 
              onAuthorClick={setActiveAuthor} 
              t={t} 
            />
          );
        }
        if (activeAuthor) {
          return (
            <AuthorProfileScreen 
              authorName={activeAuthor}
              posts={posts.filter(p => p.author === activeAuthor)}
              onBack={() => setActiveAuthor(null)}
              userProfile={userProfile}
              onPostClick={(p) => { setActivePost(p); setActiveAuthor(null); }}
              onFollow={() => toggleFollowAuthor(activeAuthor)}
              isFollowing={(userProfile?.followedAuthors || []).includes(activeAuthor)}
              onKeywordClick={setActiveKeyword}
              t={t}
              lang={lang}
            />
          );
        }
        if (activePost) {
          return (
            <PostDetailScreen 
              post={activePost} 
              onBack={() => setActivePost(null)}
              userProfile={userProfile}
              onLike={() => toggleLike(activePost.id, activePost.likedBy || [])}
              isLiked={(activePost.likedBy || []).includes(authUser.uid)}
              onFollow={() => toggleFollowAuthor(activePost.author)}
              isFollowing={(userProfile.followedAuthors || []).includes(activePost.author)}
              onAuthorClick={setActiveAuthor}
              t={t}
              lang={lang}
            />
          );
        }
        switch (currentTab) {
          case 'home':
            return <HomeScreen posts={posts} userProfile={userProfile} onPostClick={setActivePost} onLike={(p) => toggleLike(p.id, p.likedBy || [])} currentUserId={authUser.uid} onAuthorClick={setActiveAuthor} t={t} lang={lang} />;
          case 'add':
            return <CreatePostScreen onSuccess={() => setCurrentTab('home')} userProfile={userProfile} currentUserId={authUser.uid} onAddPost={addPost} t={t} />;
          case 'profile':
            return <ProfileScreen userProfile={userProfile} posts={posts.filter(p => p.postedByUid === authUser.uid)} onPostClick={setActivePost} t={t} lang={lang} />;
          case 'settings':
            return <SettingsScreen userProfile={userProfile} onUpdateProfile={updateProfile} onLogout={handleLogout} t={t} />;
          default: return null;
        }
      };

      const NavItem = ({ tab, icon: IconComponent, label }) => (
        <button 
          onClick={() => { setCurrentTab(tab); setActivePost(null); setActiveAuthor(null); setActiveKeyword(null); }} 
          className={`flex md:flex-row flex-col items-center gap-0 md:gap-4 p-3 md:p-4 w-full md:justify-start justify-center transition-all duration-300 rounded-xl
            ${currentTab === tab && !activePost && !activeAuthor && !activeKeyword ? 'text-[#2C2C2A] bg-[#F4F3EF]' : 'text-[#8C8C85] hover:bg-[#F4F3EF]/50 hover:text-[#2C2C2A]'}`}
        >
          <IconComponent className="w-6 h-6 md:w-5 md:h-5" />
          <span className="text-[10px] md:text-[15px] font-bold tracking-wider mt-1 md:mt-0">{label}</span>
        </button>
      );

      return (
        <div className={`min-h-screen bg-[#EAE9E4] text-[#2C2C2A] flex justify-center ${fontClass}`}>
          {!userProfile ? (
            <LoginScreen authUser={authUser} onLogin={(name) => {
              db.collection('artifacts').doc(appId).collection('users').doc(authUser.uid).collection('profile').doc('data').set({
                username: name, userNumber: Math.floor(1000+Math.random()*9000), followedAuthors: [], fontPreference: 'serif', appLanguage: 'ja', geminiApiKey: ''
              });
            }} t={t} />
          ) : (
            <div className="w-full max-w-[1200px] flex relative bg-[var(--bg-color)] shadow-2xl shadow-black/5">
              
              {/* Desktop Left Sidebar */}
              <nav className="hidden md:flex flex-col w-64 h-screen sticky top-0 border-r border-[var(--border-color)] pt-12 pb-8 px-4 justify-between bg-white/50">
                <div>
                  <h1 className="text-3xl font-serif font-bold tracking-[0.2em] mb-12 px-4 text-[#2C2C2A]">KINGEN</h1>
                  <div className="space-y-2">
                    <NavItem tab="home" icon={HomeIcon} label={t.home} />
                    <NavItem tab="add" icon={PenIcon} label={t.add} />
                    <NavItem tab="profile" icon={BookIcon} label={t.mypage} />
                  </div>
                </div>
                <div>
                   <NavItem tab="settings" icon={SettingsIcon} label={t.settings} />
                </div>
              </nav>

              {/* Main Content Area */}
              <main className="flex-1 max-w-[650px] min-h-screen border-r-0 lg:border-r border-[var(--border-color)] relative pb-20 md:pb-0 overflow-y-auto bg-white/40">
                 {renderScreen()}
              </main>

              {/* Desktop Right Sidebar (Discover / Trend placeholder) */}
              <aside className="hidden lg:block w-[320px] h-screen sticky top-0 pt-12 px-8 bg-white/30">
                <div className="bg-white p-6 rounded-2xl border border-[var(--border-color)] shadow-sm animate-fade-up delay-200">
                  <h3 className="font-bold text-sm tracking-widest text-[#8C8C85] mb-4 uppercase">Concept</h3>
                  <p className="text-sm leading-loose text-[#2C2C2A]">
  {t.subtitle}
</p>
                </div>
              </aside>

              {/* Mobile Bottom Nav */}

    function CreatePostScreen({ onSuccess, userProfile, currentUserId, onAddPost, t }) {
      const [content, setContent] = useState('');
      const [author, setAuthor] = useState('');
      const [isChecking, setIsChecking] = useState(false);
      const [errorMsg, setErrorMsg] = useState('');

      const handlePost = async () => {
        if (!content.trim() || !author.trim()) return;
        setIsChecking(true);
        setErrorMsg('');

        try {
          // AI判定
          const result = await checkWordWithAI(content, author);
          
          if (result.isValid) {
            const cleanAuthor = author.trim();
            const postData = {
              content: content.trim(),
              author: cleanAuthor,
              ja_text: result.ja_text || "",
              en_text: result.en_text || "",
              estimatedAge_relative: result.estimatedAge_relative || "",
              estimatedAge_absolute: result.estimatedAge_absolute || "",
              explanation_ja: result.explanation_ja || "",
              explanation_en: result.explanation_en || "",
              episode_ja: result.episode_ja || "",
              episode_en: result.episode_en || "",
              authorKeywords: result.authorKeywords || [],
              postedByUid: currentUserId,
              postedByUserNumber: userProfile.userNumber,
              createdAt: Date.now(),
              likes: 0,
              likedBy: []
            };
            
            await onAddPost(postData);
            onSuccess();
          } else {
            setErrorMsg(`判定不可: ${result.reason || '歴史的記録として確認できませんでした。'}`);
          }
        } catch (err) {
          console.error(err);
          setErrorMsg(err.message || '通信エラーが発生しました。設定でAPIキーを確認してください。');
        } finally {
          setIsChecking(false);
        }
      };

      return (
        <div className="p-8 md:p-12 h-full flex flex-col bg-[var(--bg-color)] animate-fade-up">
          <div className="mb-10">
            <h2 className="text-3xl font-bold tracking-widest text-[#2C2C2A]">{t.postTitle}</h2>
          </div>

          <div className="flex-1 flex flex-col gap-8">
            <div>
              <textarea value={content} onChange={(e) => setContent(e.target.value)} className="w-full h-40 p-6 bg-white border border-[var(--border-color)] rounded-2xl focus:border-[#2C2C2A] focus:ring-1 focus:ring-[#2C2C2A] outline-none resize-none text-xl leading-loose shadow-sm placeholder-[#C4C3BE] transition-all" placeholder={t.wordPlaceholder} disabled={isChecking} />
            </div>

            <div>
              <input type="text" value={author} onChange={(e) => setAuthor(e.target.value)} className="w-full p-5 bg-white border border-[var(--border-color)] rounded-xl focus:border-[#2C2C2A] focus:ring-1 focus:ring-[#2C2C2A] outline-none text-lg shadow-sm placeholder-[#C4C3BE] transition-all" placeholder={t.authorPlaceholder} disabled={isChecking} />
            </div>

            {errorMsg && (
              <div className="bg-red-50 text-red-700 p-5 rounded-xl text-sm flex items-start gap-3 border border-red-100 animate-fade-up">
                <AlertCircle className="w-5 h-5 flex-shrink-0" />
                <span className="whitespace-pre-wrap leading-relaxed">{errorMsg}</span>
              </div>
            )}

            <div className="mt-auto pt-8">
              <div className="bg-[#F4F3EF] text-[#5C5C5A] p-5 rounded-xl text-[13px] mb-6 flex items-start gap-3 shadow-inner">
                <Info className="w-5 h-5 flex-shrink-0 mt-0.5" />
                <p className="leading-loose tracking-wide">{t.postNote}</p>
              </div>
              <button onClick={handlePost} disabled={isChecking || !content.trim() || !author.trim()} className={`w-full py-5 rounded-xl font-bold tracking-widest text-white flex items-center justify-center transition-all shadow-lg ${isChecking ? 'bg-[#8C8C85] cursor-not-allowed' : (!content.trim() || !author.trim() ? 'bg-[#C4C3BE]' : 'bg-[#2C2C2A] hover:bg-black active:scale-[0.98]')}`}>
                {isChecking ? <><LoaderIcon className="w-5 h-5 mr-3" />{t.checking}</> : t.checkBtn}
              </button>
            </div>
          </div>
        </div>
      );
    }

                    {t.fontSetting} <span className={userProfile?.fontPreference === 'serif' ? 'font-serif' : 'font-sans'}>{userProfile?.fontPreference === 'serif' ? t.fontMincho : t.fontGothic}</span>
                  </button>
                  <button onClick={toggleLang} className="w-full text-left px-5 py-4 bg-[#FDFDFB] border border-[#EAE9E4] rounded-xl text-sm font-bold tracking-widest hover:bg-[#F4F3EF] transition-colors flex justify-between items-center">
                     <div className="flex items-center gap-2"><Languages className="w-4 h-4"/> {t.langSetting}</div>
                  </button>
                </div>
              </div>

              {/* Account */}
              <div className="pt-8">
                <button onClick={onLogout} className="w-full py-4 text-red-600 font-bold tracking-widest border border-red-200 rounded-xl hover:bg-red-50 transition-colors">
                  {t.logout}
                </button>
              </div>
           </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
