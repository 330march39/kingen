<body>
  <div id="root"></div>

  <!-- Firebase の読み込みと React コードのコンパイル実行を制御 -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot, query, updateDoc, deleteDoc, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // グローバルにFirebase関数をエクスポート
    window.FirebaseLib = {
      initializeApp, getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, signOut,
      getFirestore, collection, doc, setDoc, getDoc, onSnapshot, query, updateDoc, deleteDoc, addDoc
    };

    // Firebaseの準備が完了してからBabelでコンパイル＆実行することで「真っ白エラー」を防止
    try {
      const code = document.getElementById('react-app-code').textContent;
      const compiled = Babel.transform(code, { presets: ['react'] }).code;
      const script = document.createElement('script');
      script.textContent = compiled;
      document.body.appendChild(script);
    } catch (e) {
      console.error("Babel Compilation Error:", e);
      document.getElementById('root').innerHTML = '<div style="padding: 20px; color: red;">アプリケーションの読み込みに失敗しました。再読み込みしてください。</div>';
    }
  </script>

  <!-- React アプリケーションコード (プレーンテキストとして定義) -->
  <script type="text/plain" id="react-app-code">
    const { useState, useEffect, useMemo, useCallback } = React;
    const { 
      initializeApp, getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, signOut,
      getFirestore, collection, doc, setDoc, getDoc, onSnapshot, query, updateDoc, deleteDoc, addDoc
    } = window.FirebaseLib;

    // --- Icons ---
    const Icon = ({ children, className = "w-6 h-6", ...props }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>{children}</svg>
    );
    const Home = (p) => <Icon {...p}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></Icon>;
    const PlusCircle = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></Icon>;
    const User = (p) => <Icon {...p}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></Icon>;
    const Heart = (p) => <Icon {...p}><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></Icon>;
    const ChevronLeft = (p) => <Icon {...p}><path d="m15 18-6-6 6-6"/></Icon>;
    const Bot = (p) => <Icon {...p}><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></Icon>;
    const BookOpen = (p) => <Icon {...p}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></Icon>;
    const Settings = (p) => <Icon {...p}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></Icon>;
    const Loader2 = (p) => <Icon {...p} className={`animate-spin ${p.className || "w-6 h-6"}`}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></Icon>;
    const Info = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></Icon>;
    const AlertCircle = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></Icon>;
    const Languages = (p) => <Icon {...p}><path d="m5 8 6 6"/><path d="m4 14 6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="m22 22-5-10-5 10"/><path d="M14 18h6"/></Icon>;

    // --- Translations (i18n) ---
    const i18n = {
      ja: {
        appName: 'KINGEN',
        subtitle: '質の高い言葉だけが存在するSNS',
        loginId: 'ID (ユーザー名)',
        password: 'パスワード',
        loginBtn: 'ログイン',
        registerBtn: '新規登録してはじめる',
        noAccount: 'アカウントをお持ちでない方はこちら',
        hasAccount: 'すでにアカウントをお持ちの方はこちら',
        home: 'ホーム',
        recommend: 'おすすめ',
        following: 'フォロー',
        add: '投稿',
        mypage: 'マイページ',
        noPosts: '投稿がありません。',
        postTitle: '名言を共有する',
        wordLabel: '言葉',
        wordPlaceholder: '好きな名言や金言を入力してください',
        authorLabel: '発言者',
        authorPlaceholder: 'ソクラテス、ゲーテ、アニメキャラ名など',
        checkBtn: 'AIでチェックして投稿する',
        checking: 'AIが確認中...',
        postNote: '投稿前にAIが歴史的記録に基づく実在性をチェックします。「こんにちは」等の一般的な言葉や現代人のコメントは投稿できません。AIが言葉を正確に修正し、美しく表示できるように改行を整えます。',
        followBtn: 'フォロー',
        followingBtn: 'フォロー中',
        aiExp: 'AI 解説',
        episode: '深掘りエピソード',
        originalText: '英訳・原文',
        posterMark: '投稿者マーク',
        memberNo: '会員番号',
        myPosts: '自分の投稿一覧',
        fontGothic: 'ゴシック体',
        fontMincho: '明朝体',
        langSetting: 'Language: 日本語',
        authorProfileTitle: 'プロフィール'
      },
      en: {
        appName: 'KINGEN',
        subtitle: 'A Social Network of Profound Words',
        loginId: 'ID (Username)',
        password: 'Password',
        loginBtn: 'Login',
        registerBtn: 'Sign up & Start',
        noAccount: "Don't have an account?",
        hasAccount: 'Already have an account?',
        home: 'Home',
        recommend: 'For You',
        following: 'Following',
        add: 'Post',
        mypage: 'Profile',
        noPosts: 'No posts yet.',
        postTitle: 'Share a Quote',
        wordLabel: 'Quote',
        wordPlaceholder: 'Enter a famous quote or maxim',
        authorLabel: 'Author',
        authorPlaceholder: 'Socrates, Goethe, etc.',
        checkBtn: 'Check with AI & Post',
        checking: 'AI is verifying...',
        postNote: 'AI verifies the quote against historical records. Common greetings or modern personal comments are not allowed. AI will correct the quote to its accurate form and format line breaks for beautiful display.',
        followBtn: 'Follow',
        followingBtn: 'Following',
        aiExp: 'AI Explanation',
        episode: 'Deep Dive Episode',
        originalText: 'Japanese Original',
        posterMark: 'Posted by',
        memberNo: 'Member No.',
        myPosts: 'My Posts',
        fontGothic: 'Sans-serif',
        fontMincho: 'Serif',
        langSetting: 'Language: English',
        authorProfileTitle: 'Author Profile'
      }
    };

    // --- Firebase Initialization ---
    const firebaseConfig = window.__firebase_config ? JSON.parse(window.__firebase_config) : {};
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof window.__app_id !== 'undefined' ? window.__app_id : 'default-kingen-app';

    // --- API Helpers ---
    const generateAIContent = async (prompt, schema, customApiKey) => {
      const apiKey = customApiKey || ""; 
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
      const payload = {
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: {
          responseMimeType: "application/json",
          responseSchema: { type: "OBJECT", properties: schema }
        }
      };

      const fetchWithRetry = async (retries = 3, delay = 1000) => {
        for (let i = 0; i < retries; i++) {
          try {
            const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            if (!response.ok) throw new Error('API Error');
            const data = await response.json();
            const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
            if (!text) throw new Error('No text in response');
            return JSON.parse(text);
          } catch (err) {
            if (i === retries - 1) throw err;
            await new Promise(r => setTimeout(r, delay * Math.pow(2, i)));
          }
        }
      };
      return fetchWithRetry();
    };

    const checkWordWithAI = async (content, author, customApiKey) => {
      const prompt = `以下の言葉が、指定された発言者（偉人、哲学者、有名人など）によって実際に言われたものか、歴史的文献や信頼できる記録に基づいているかを厳密に判定してください。
言葉: "${content}"
発言者: "${author}"

【重要要件】
1. 「こんにちは」「ありがとう」等の一般的な挨拶や推測の言葉は、名言として記録に残っている固有の言葉ではないため、必ず isValid: false にしてください。
2. 若干言葉が間違っている場合は、文献に残っている正確な言葉に修正してください。
3. 詩や名言として美しく読みやすくなるように、日本語と英語の両方において、適切な位置に改行(\\n)を含めてください。
4. 【言語要件】解説(explanation)とエピソード(episode)は、まず「日本語」で詳細に生成し、その後、それを翻訳機にかけたような自然な「英語」に訳して、それぞれ指定のJSONキーに出力してください。

以下のJSONで回答してください。`;

      const schema = {
        isValid: { type: "BOOLEAN" },
        reason: { type: "STRING" },
        ja_text: { type: "STRING" },
        en_text: { type: "STRING" },
        estimatedAge_relative: { type: "STRING", description: "例: 約2400年前" },
        estimatedAge_absolute: { type: "STRING", description: "例: 紀元前400年頃" },
        explanation_ja: { type: "STRING" },
        explanation_en: { type: "STRING" },
        episode_ja: { type: "STRING" },
        episode_en: { type: "STRING" }
      };

      return generateAIContent(prompt, schema, customApiKey);
    };

    const getAuthorProfileWithAI = async (author, customApiKey) => {
      const prompt = `発言者「${author}」に関するプロフィール解説と、関連するキーワード（職業、ジャンル、時代など）を生成してください。
【言語要件】プロフィール解説(description)は、まず「日本語」で生成し、その後「英語」に翻訳して、それぞれ指定のキーに出力してください。キーワードも日本語版と英語版を生成してください。`;
      
      const schema = {
        description_ja: { type: "STRING" },
        description_en: { type: "STRING" },
        keywords_ja: { type: "ARRAY", items: { type: "STRING" } },
        keywords_en: { type: "ARRAY", items: { type: "STRING" } }
      };
      return generateAIContent(prompt, schema, customApiKey);
    };

    // --- Components ---
    const AuthorAvatar = ({ name, size = 'md', onClick }) => {
      const initial = name ? name.charAt(0).toUpperCase() : '?';
      const sizeClasses = { sm: 'w-8 h-8 text-sm', md: 'w-10 h-10 text-base', lg: 'w-16 h-16 text-2xl' };
      return (
        <div 
          onClick={(e) => { if(onClick) { e.stopPropagation(); onClick(name); } }}
          className={`${sizeClasses[size]} rounded-full bg-gray-800 text-white flex items-center justify-center font-bold flex-shrink-0 ${onClick ? 'cursor-pointer hover:bg-gray-700 transition' : ''}`}
        >
          {initial}
        </div>
      );
    };

    const AgeDisplay = ({ relative, absolute }) => {
      const [showAbsolute, setShowAbsolute] = useState(false);
      
      if (!relative && !absolute) return null;
      
      return (
        <span 
          onClick={(e) => { e.stopPropagation(); setShowAbsolute(!showAbsolute); }}
          className="text-xs font-medium text-gray-500 whitespace-nowrap ml-2 bg-gray-100 px-2.5 py-1 rounded-md cursor-pointer hover:bg-gray-200 transition select-none"
          title="タップで年代表示を切り替え"
        >
          {showAbsolute ? (absolute || relative) : (relative || absolute)}
        </span>
      );
    };

    // --- Main App Component ---
    function App() {
      const [authUser, setAuthUser] = useState(null);
      const [userProfile, setUserProfile] = useState(null);
      const [posts, setPosts] = useState([]);
      
      const [currentTab, setCurrentTab] = useState('home');
      const [activePost, setActivePost] = useState(null);
      const [activeAuthor, setActiveAuthor] = useState(null); 
      
      const [isInitializing, setIsInitializing] = useState(true);

      useEffect(() => {
        const initAuth = async () => {
          try {
            if (typeof window.__initial_auth_token !== 'undefined' && window.__initial_auth_token) {
              await signInWithCustomToken(auth, window.__initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
          } catch (error) {
            console.error("Auth init failed:", error);
          }
        };
        initAuth();

        const unsubscribe = onAuthStateChanged(auth, (user) => {
          setAuthUser(user);
          if (!user) setIsInitializing(false);
        });
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!authUser) return;
        const profileRef = doc(db, 'artifacts', appId, 'users', authUser.uid, 'profile', 'data');
        const unsub = onSnapshot(profileRef, (docSnap) => {
          if (docSnap.exists()) {
            setUserProfile(docSnap.data());
          } else {
            setUserProfile(null);
          }
          setIsInitializing(false);
        }, (err) => {
          console.error("Profile fetch error:", err);
          setIsInitializing(false);
        });
        return () => unsub();
      }, [authUser]);

      useEffect(() => {
        if (!authUser) return;
        const postsRef = collection(db, 'artifacts', appId, 'public', 'data', 'posts');
        const unsub = onSnapshot(postsRef, (snap) => {
          const postsData = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          postsData.sort((a, b) => b.createdAt - a.createdAt);
          setPosts(postsData);
        }, (err) => console.error("Posts fetch error:", err));
        return () => unsub();
      }, [authUser]);

      const toggleLike = async (postId, likedBy) => {
        if (!authUser || !userProfile) return;
        const isLiked = likedBy.includes(authUser.uid);
        const postRef = doc(db, 'artifacts', appId, 'public', 'data', 'posts', postId);
        
        let newLikedBy = [...likedBy];
        if (isLiked) {
          newLikedBy = newLikedBy.filter(id => id !== authUser.uid);
        } else {
          newLikedBy.push(authUser.uid);
        }
        await updateDoc(postRef, { likes: newLikedBy.length, likedBy: newLikedBy });
      };

      const toggleFollowAuthor = async (authorName) => {
        if (!authUser || !userProfile) return;
        const profileRef = doc(db, 'artifacts', appId, 'users', authUser.uid, 'profile', 'data');
        
        let newFollowing = [...(userProfile.followedAuthors || [])];
        if (newFollowing.includes(authorName)) {
          newFollowing = newFollowing.filter(name => name !== authorName);
        } else {
          newFollowing.push(authorName);
        }
        await updateDoc(profileRef, { followedAuthors: newFollowing });
      };

      const updateProfile = async (updates) => {
        if (!authUser) return;
        const profileRef = doc(db, 'artifacts', appId, 'users', authUser.uid, 'profile', 'data');
        await updateDoc(profileRef, updates);
      };

      if (isInitializing) {
        return <div className="flex items-center justify-center h-screen bg-gray-50"><Loader2 className="w-8 h-8 text-gray-500" /></div>;
      }

      const fontClass = userProfile?.fontPreference === 'serif' ? 'font-serif' : 'font-sans';
      const lang = userProfile?.appLanguage || 'ja';
      const t = i18n[lang];

      const renderScreen = () => {
        if (activeAuthor) {
          return (
            <AuthorProfileScreen 
              authorName={activeAuthor}
              posts={posts.filter(p => p.author === activeAuthor)}
              onBack={() => setActiveAuthor(null)}
              userProfile={userProfile}
              onPostClick={(p) => { setActivePost(p); setActiveAuthor(null); }}
              onFollow={() => toggleFollowAuthor(activeAuthor)}
              isFollowing={(userProfile?.followedAuthors || []).includes(activeAuthor)}
              t={t}
              lang={lang}
            />
          );
        }
        if (activePost) {
          return (
            <PostDetailScreen 
              post={activePost} 
              onBack={() => setActivePost(null)}
              userProfile={userProfile}
              onLike={() => toggleLike(activePost.id, activePost.likedBy || [])}
              isLiked={(activePost.likedBy || []).includes(authUser.uid)}
              onFollow={() => toggleFollowAuthor(activePost.author)}
              isFollowing={(userProfile.followedAuthors || []).includes(activePost.author)}
              onAuthorClick={setActiveAuthor}
              t={t}
              lang={lang}
            />
          );
        }
        switch (currentTab) {
          case 'home':
            return <HomeScreen posts={posts} userProfile={userProfile} onPostClick={setActivePost} onLike={(p) => toggleLike(p.id, p.likedBy || [])} currentUserId={authUser.uid} onAuthorClick={setActiveAuthor} t={t} lang={lang} />;
          case 'add':
            return <CreatePostScreen onSuccess={() => setCurrentTab('home')} userProfile={userProfile} currentUserId={authUser.uid} t={t} />;
          case 'profile':
            return <ProfileScreen userProfile={userProfile} posts={posts.filter(p => p.postedByUid === authUser.uid)} onPostClick={setActivePost} onUpdateProfile={updateProfile} t={t} lang={lang} />;
          default: return null;
        }
      };

      return (
        <div className={`max-w-md mx-auto h-screen bg-gray-50 flex flex-col relative shadow-2xl overflow-hidden ${fontClass} text-gray-900`}>
          {!userProfile ? (
            <LoginScreen authUser={authUser} t={t} />
          ) : (
            <>
              <div className="flex-1 overflow-y-auto pb-16 relative">
                {renderScreen()}
              </div>

              {(!activePost && !activeAuthor) && (
                <div className="absolute bottom-0 w-full bg-white border-t border-gray-200 flex justify-around items-center h-16 px-4 z-50">
                  <button onClick={() => setCurrentTab('home')} className={`p-2 flex flex-col items-center transition-colors ${currentTab === 'home' ? 'text-black' : 'text-gray-400 hover:text-gray-600'}`}>
                    <Home className="w-6 h-6" />
                    <span className="text-[10px] mt-1">{t.home}</span>
                  </button>
                  <button onClick={() => setCurrentTab('add')} className={`p-2 flex flex-col items-center transition-colors ${currentTab === 'add' ? 'text-black' : 'text-gray-400 hover:text-gray-600'}`}>
                    <PlusCircle className="w-8 h-8" />
                  </button>
                  <button onClick={() => setCurrentTab('profile')} className={`p-2 flex flex-col items-center transition-colors ${currentTab === 'profile' ? 'text-black' : 'text-gray-400 hover:text-gray-600'}`}>
                    <User className="w-6 h-6" />
                    <span className="text-[10px] mt-1">{t.mypage}</span>
                  </button>
                </div>
              )}
            </>
          )}
        </div>
      );
    }

    // ==========================================
    // Sub Screens
    // ==========================================

    function LoginScreen({ authUser, t }) {
      const [username, setUsername] = useState('');
      const [password, setPassword] = useState('');
      const [loading, setLoading] = useState(false);
      const [isLoginMode, setIsLoginMode] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!username.trim() || !authUser) return;
        setLoading(true);
        try {
          const profileRef = doc(db, 'artifacts', appId, 'users', authUser.uid, 'profile', 'data');
          const docSnap = await getDoc(profileRef);
          if (!docSnap.exists()) {
            await setDoc(profileRef, {
              username: username.trim(),
              userNumber: Math.floor(1000 + Math.random() * 9000),
              followedAuthors: [],
              fontPreference: 'sans',
              appLanguage: 'ja',
              geminiApiKey: ''
            });
          }
        } catch (error) {
          console.error(error);
          alert("Error");
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="flex flex-col items-center justify-center h-full p-6 bg-white">
          <h1 className="text-4xl font-serif font-bold tracking-widest mb-2">{t.appName}</h1>
          <p className="text-gray-500 text-sm mb-10 text-center">{t.subtitle}</p>
          
          <form onSubmit={handleSubmit} className="w-full max-w-sm space-y-4">
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-1">{t.loginId}</label>
              <input type="text" value={username} onChange={(e) => setUsername(e.target.value)} className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-800 outline-none transition" required />
            </div>
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-1">{t.password}</label>
              <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-800 outline-none transition" required />
            </div>
            <button type="submit" disabled={loading} className="w-full bg-black text-white py-3 rounded-lg font-medium hover:bg-gray-800 transition flex justify-center items-center mt-6">
              {loading ? <Loader2 className="w-5 h-5 text-white" /> : (isLoginMode ? t.loginBtn : t.registerBtn)}
            </button>
          </form>
          <button onClick={() => setIsLoginMode(!isLoginMode)} className="mt-6 text-sm text-gray-500 hover:text-black underline">
            {isLoginMode ? t.noAccount : t.hasAccount}
          </button>
        </div>
      );
    }

    function HomeScreen({ posts, userProfile, onPostClick, onLike, currentUserId, onAuthorClick, t, lang }) {
      const [subTab, setSubTab] = useState('recommend');

      const displayPosts = useMemo(() => {
        if (subTab === 'recommend') {
          return [...posts].sort((a, b) => {
            if (b.likes !== a.likes) return b.likes - a.likes;
            return b.createdAt - a.createdAt;
          });
        } else {
          const followed = userProfile?.followedAuthors || [];
          return posts.filter(p => followed.includes(p.author)).sort((a, b) => b.createdAt - a.createdAt);
        }
      }, [posts, subTab, userProfile]);

      return (
        <div className="flex flex-col min-h-full bg-white">
          <div className="sticky top-0 bg-white/90 backdrop-blur-md z-10 border-b border-gray-100 flex px-4 pt-4 pb-2">
            <button onClick={() => setSubTab('recommend')} className={`flex-1 text-center pb-2 font-medium transition-colors border-b-2 ${subTab === 'recommend' ? 'border-black text-black' : 'border-transparent text-gray-400 hover:text-gray-600'}`}>{t.recommend}</button>
            <button onClick={() => setSubTab('following')} className={`flex-1 text-center pb-2 font-medium transition-colors border-b-2 ${subTab === 'following' ? 'border-black text-black' : 'border-transparent text-gray-400 hover:text-gray-600'}`}>{t.following}</button>
          </div>

          <div className="flex-1 p-0">
            {displayPosts.length === 0 ? (
              <div className="p-8 text-center text-gray-400 mt-10">{t.noPosts}</div>
            ) : (
              displayPosts.map(post => {
                const mainText = lang === 'ja' ? (post.ja_text || post.content) : (post.en_text || post.content);
                return (
                  <div key={post.id} className="border-b border-gray-100 p-5 hover:bg-gray-50 transition cursor-pointer" onClick={() => onPostClick(post)}>
                    <div className="flex items-start gap-3">
                      <AuthorAvatar name={post.author} onClick={onAuthorClick} />
                      <div className="flex-1 min-w-0">
                        <div className="flex items-baseline justify-between mb-2">
                          <h3 className="font-bold text-gray-900 truncate hover:underline" onClick={(e) => { e.stopPropagation(); onAuthorClick(post.author); }}>
                            {post.author}
                          </h3>
                          <AgeDisplay relative={post.estimatedAge_relative} absolute={post.estimatedAge_absolute} />
                        </div>
                        <p className="text-gray-800 whitespace-pre-wrap leading-relaxed text-[16px]">{mainText}</p>
                        
                        <div className="flex items-center justify-end mt-4 gap-4">
                          <button onClick={(e) => { e.stopPropagation(); onLike(post); }} className="flex items-center gap-1.5 group">
                            <Heart className={`w-5 h-5 transition-colors ${(post.likedBy || []).includes(currentUserId) ? 'fill-red-500 text-red-500' : 'text-gray-400 group-hover:text-red-400'}`} />
                            <span className={`text-sm ${(post.likedBy || []).includes(currentUserId) ? 'text-red-500' : 'text-gray-500'}`}>{post.likes || 0}</span>
                          </button>
                        </div>
                      </div>
                    </div>
                  </div>
                );
              })
            )}
          </div>
        </div>
      );
    }

    function PostDetailScreen({ post, onBack, userProfile, onLike, isLiked, onFollow, isFollowing, onAuthorClick, t, lang }) {
      if (!post) return null;

      const mainText = lang === 'ja' ? (post.ja_text || post.content) : (post.en_text || post.content);
      const subText = lang === 'ja' ? post.en_text : post.ja_text;
      
      const explanation = lang === 'ja' ? (post.explanation_ja || post.explanation) : (post.explanation_en || post.explanation);
      const episode = lang === 'ja' ? (post.episode_ja || post.episode) : (post.episode_en || post.episode);

      return (
        <div className="flex flex-col min-h-full bg-white transition-all duration-200">
          <div className="sticky top-0 bg-white/90 backdrop-blur-md z-10 border-b border-gray-100 px-2 py-3 flex items-center">
            <button onClick={onBack} className="p-2 hover:bg-gray-100 rounded-full transition"><ChevronLeft className="w-6 h-6" /></button>
            <span className="font-bold ml-2">{t.home}</span>
          </div>

          <div className="p-5 flex-1 pb-10">
            <div className="flex items-center justify-between mb-8">
              <div className="flex items-center gap-3 cursor-pointer group" onClick={() => onAuthorClick(post.author)}>
                <AuthorAvatar name={post.author} size="lg" />
                <div>
                  <h2 className="font-bold text-2xl group-hover:underline">{post.author}</h2>
                  <div className="mt-1">
                    <AgeDisplay relative={post.estimatedAge_relative} absolute={post.estimatedAge_absolute} />
                  </div>
                </div>
              </div>
              <button onClick={onFollow} className={`px-4 py-1.5 rounded-full text-sm font-bold border transition ${isFollowing ? 'bg-white text-black border-gray-300' : 'bg-black text-white border-black'}`}>
                {isFollowing ? t.followingBtn : t.followBtn}
              </button>
            </div>

            <div className="mb-10">
              <p className="text-2xl md:text-3xl leading-loose font-medium text-gray-900 whitespace-pre-wrap">{mainText}</p>
              {subText && (
                <div className="mt-6 p-4 bg-gray-50 rounded-xl border border-gray-100">
                  <span className="text-xs font-bold text-gray-400 mb-2 block uppercase tracking-wider">{t.originalText}</span>
                  <p className="text-sm md:text-base text-gray-600 whitespace-pre-wrap leading-relaxed">{subText}</p>
                </div>
              )}
            </div>

            <div className="space-y-4 mb-8">
              {explanation && (
                <div className="bg-blue-50/50 rounded-xl p-5 border border-blue-100/50">
                  <div className="flex items-center gap-2 mb-3">
                    <Bot className="w-5 h-5 text-blue-600" />
                    <span className="text-sm font-bold text-blue-900">{t.aiExp}</span>
                  </div>
                  <p className="text-sm text-gray-700 leading-relaxed whitespace-pre-wrap">{explanation}</p>
                </div>
              )}

              {episode && (
                <div className="bg-amber-50/50 rounded-xl p-5 border border-amber-100/50">
                  <div className="flex items-center gap-2 mb-3">
                    <BookOpen className="w-5 h-5 text-amber-600" />
                    <span className="text-sm font-bold text-amber-900">{t.episode}</span>
                  </div>
                  <p className="text-sm text-gray-700 leading-relaxed whitespace-pre-wrap">{episode}</p>
                </div>
              )}
            </div>

            <div className="flex items-end justify-between mt-8 pt-6 border-t border-gray-100">
              <button onClick={onLike} className="flex items-center gap-2 group">
                 <Heart className={`w-8 h-8 transition-colors ${isLiked ? 'fill-red-500 text-red-500' : 'text-gray-300 group-hover:text-red-400'}`} />
                 <span className={`font-bold text-lg ${isLiked ? 'text-red-500' : 'text-gray-400'}`}>{post.likes || 0}</span>
              </button>
              
              <div className="flex flex-col items-end gap-1">
                <span className="text-xs text-gray-400">{t.posterMark}</span>
                <div className="bg-gray-100 text-gray-600 px-3 py-1 rounded-md text-xs font-bold font-sans">
                  No. {post.postedByUserNumber}
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function AuthorProfileScreen({ authorName, posts, onBack, userProfile, onPostClick, onFollow, isFollowing, t, lang }) {
      const [authorInfo, setAuthorInfo] = useState(null);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        const fetchInfo = async () => {
          setLoading(true);
          try {
            // Firestoreに保存されているプロフィールを取得
            const authorRef = doc(db, 'artifacts', appId, 'public', 'data', 'authors', authorName);
            const docSnap = await getDoc(authorRef);
            
            if (docSnap.exists()) {
              setAuthorInfo(docSnap.data());
            } else {
              setAuthorInfo({ description_ja: "プロフィール情報がありません。", keywords_ja: [] });
            }
          } catch (err) {
            console.error("Failed to fetch author profile", err);
          } finally {
            setLoading(false);
          }
        };
        fetchInfo();
      }, [authorName]);

      const description = lang === 'ja' ? (authorInfo?.description_ja) : (authorInfo?.description_en || authorInfo?.description_ja);
      const keywords = lang === 'ja' ? (authorInfo?.keywords_ja || []) : (authorInfo?.keywords_en || authorInfo?.keywords_ja || []);

      return (
        <div className="flex flex-col min-h-full bg-white transition-all duration-200 z-20 absolute inset-0">
          <div className="sticky top-0 bg-white/90 backdrop-blur-md z-10 border-b border-gray-100 px-2 py-3 flex items-center">
            <button onClick={onBack} className="p-2 hover:bg-gray-100 rounded-full transition"><ChevronLeft className="w-6 h-6" /></button>
            <span className="font-bold ml-2">{t.authorProfileTitle}</span>
          </div>

          <div className="flex-1 overflow-y-auto">
            <div className="bg-gray-900 text-white p-8 flex flex-col items-center text-center">
              <AuthorAvatar name={authorName} size="lg" />
              <h2 className="text-3xl font-bold mt-4 mb-3">{authorName}</h2>
              
              <div className="flex flex-wrap justify-center gap-2 mb-6">
                {keywords.map((kw, i) => (
                  <span key={i} className="px-3 py-1 bg-white/10 rounded-full text-xs font-medium border border-white/20">{kw}</span>
                ))}
              </div>

              <button onClick={onFollow} className={`px-8 py-2 rounded-full text-sm font-bold border transition ${isFollowing ? 'bg-white text-black border-transparent' : 'bg-transparent text-white border-white hover:bg-white/10'}`}>
                {isFollowing ? t.followingBtn : t.followBtn}
              </button>
            </div>

            <div className="p-6 border-b border-gray-100 bg-gray-50/50">
              {loading ? (
                <div className="flex flex-col items-center justify-center py-6 text-gray-400 space-y-3">
                  <Loader2 className="w-6 h-6 animate-spin" />
                </div>
              ) : (
                <p className="text-gray-700 text-sm leading-relaxed whitespace-pre-wrap">{description}</p>
              )}
            </div>

            <div className="p-0">
              <div className="px-5 py-4 font-bold border-b border-gray-100 bg-white sticky top-0">
                Posts ({posts.length})
              </div>
              {posts.length === 0 ? (
                <div className="p-8 text-center text-gray-400">{t.noPosts}</div>
              ) : (
                posts.sort((a, b) => b.createdAt - a.createdAt).map(post => {
                   const mainText = lang === 'ja' ? (post.ja_text || post.content) : (post.en_text || post.content);
                   return (
                    <div key={post.id} className="border-b border-gray-100 p-5 hover:bg-gray-50 transition cursor-pointer" onClick={() => onPostClick(post)}>
                      <p className="text-gray-800 whitespace-pre-wrap leading-relaxed text-[16px] mb-3">{mainText}</p>
                      <div className="flex items-center justify-between">
                        <AgeDisplay relative={post.estimatedAge_relative} absolute={post.estimatedAge_absolute} />
                        <div className="flex items-center gap-1">
                          <Heart className="w-4 h-4 text-red-500 fill-red-500" />
                          <span className="text-xs text-gray-500 font-medium">{post.likes || 0}</span>
                        </div>
                      </div>
                    </div>
                  );
                })
              )}
            </div>
          </div>
        </div>
      );
    }

    function CreatePostScreen({ onSuccess, userProfile, currentUserId, t }) {
      const [content, setContent] = useState('');
      const [author, setAuthor] = useState('');
      const [isChecking, setIsChecking] = useState(false);
      const [errorMsg, setErrorMsg] = useState('');

      const handlePost = async () => {
        if (!content.trim() || !author.trim()) return;
        setIsChecking(true);
        setErrorMsg('');

        try {
          const result = await checkWordWithAI(content, author, userProfile?.geminiApiKey);
          
          if (result.isValid) {
            // --- 著者が初登場かチェックし、いなければプロフィールを生成・保存 ---
            const cleanAuthor = author.trim();
            const authorRef = doc(db, 'artifacts', appId, 'public', 'data', 'authors', cleanAuthor);
            const authorSnap = await getDoc(authorRef);
            
            if (!authorSnap.exists()) {
               const profileRes = await getAuthorProfileWithAI(cleanAuthor, userProfile?.geminiApiKey);
               await setDoc(authorRef, {
                 name: cleanAuthor,
                 description_ja: profileRes.description_ja || "",
                 description_en: profileRes.description_en || "",
                 keywords_ja: profileRes.keywords_ja || [],
                 keywords_en: profileRes.keywords_en || [],
                 createdAt: Date.now()
               });
            }

            // --- 投稿の保存 ---
            const postData = {
              content: content.trim(),
              author: cleanAuthor,
              ja_text: result.ja_text || "",
              en_text: result.en_text || "",
              estimatedAge_relative: result.estimatedAge_relative || "",
              estimatedAge_absolute: result.estimatedAge_absolute || "",
              explanation_ja: result.explanation_ja || "",
              explanation_en: result.explanation_en || "",
              episode_ja: result.episode_ja || "",
              episode_en: result.episode_en || "",
              postedByUid: currentUserId,
              postedByUserNumber: userProfile.userNumber,
              createdAt: Date.now(),
              likes: 0,
              likedBy: []
            };
            
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'posts'), postData);
            onSuccess();
          } else {
            setErrorMsg(`判定エラー: ${result.reason || '名言として確認できませんでした。'}`);
          }
        } catch (err) {
          console.error(err);
          setErrorMsg('通信エラーが発生しました。時間を置いて再試行してください。');
        } finally {
          setIsChecking(false);
        }
      };

      return (
        <div className="p-5 h-full flex flex-col bg-white">
          <div className="flex items-center justify-between mb-6">
            <h2 className="text-2xl font-bold">{t.postTitle}</h2>
          </div>

          <div className="flex-1 flex flex-col gap-6">
            <div>
              <label className="block text-sm font-bold text-gray-700 mb-2">{t.wordLabel}</label>
              <textarea value={content} onChange={(e) => setContent(e.target.value)} className="w-full h-32 p-4 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-black outline-none resize-none text-lg" placeholder={t.wordPlaceholder} disabled={isChecking} />
            </div>

            <div>
              <label className="block text-sm font-bold text-gray-700 mb-2">{t.authorLabel}</label>
              <input type="text" value={author} onChange={(e) => setAuthor(e.target.value)} className="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-black outline-none text-lg" placeholder={t.authorPlaceholder} disabled={isChecking} />
            </div>

            {errorMsg && (
              <div className="bg-red-50 text-red-600 p-4 rounded-xl text-sm flex items-start gap-3 border border-red-100">
                <AlertCircle className="w-5 h-5 flex-shrink-0 mt-0.5" />
                <span className="whitespace-pre-wrap">{errorMsg}</span>
              </div>
            )}

            <div className="mt-auto mb-4">
              <div className="bg-blue-50/50 text-blue-800 p-4 rounded-xl text-xs mb-4 flex items-start gap-3 border border-blue-100/50">
                <Info className="w-5 h-5 flex-shrink-0" />
                <p className="leading-relaxed">{t.postNote}</p>
              </div>
              <button onClick={handlePost} disabled={isChecking || !content.trim() || !author.trim()} className={`w-full py-4 rounded-xl font-bold text-white flex items-center justify-center transition-all shadow-sm ${isChecking ? 'bg-gray-400 cursor-not-allowed' : (!content.trim() || !author.trim() ? 'bg-gray-300' : 'bg-black hover:bg-gray-800 active:scale-[0.98]')}`}>
                {isChecking ? <><Loader2 className="w-5 h-5 mr-2" />{t.checking}</> : t.checkBtn}
              </button>
            </div>
          </div>
        </div>
      );
    }

    function ProfileScreen({ userProfile, posts, onPostClick, onUpdateProfile, t, lang }) {
      const [isEditingSettings, setIsEditingSettings] = useState(false);
      const [apiKeyInput, setApiKeyInput] = useState(userProfile?.geminiApiKey || '');

      const toggleFont = () => onUpdateProfile({ fontPreference: userProfile.fontPreference === 'sans' ? 'serif' : 'sans' });
      const toggleLang = () => onUpdateProfile({ appLanguage: userProfile.appLanguage === 'ja' ? 'en' : 'ja' });
      const saveSettings = () => { onUpdateProfile({ geminiApiKey: apiKeyInput }); setIsEditingSettings(false); };

      return (
        <div className="flex flex-col min-h-full bg-white">
          <div className="p-8 border-b border-gray-100 bg-gray-50 flex flex-col items-center">
            <div className="w-24 h-24 bg-gray-200 rounded-full flex items-center justify-center mb-4 shadow-inner">
              <User className="w-12 h-12 text-gray-500" />
            </div>
            <h2 className="text-2xl font-bold">{userProfile?.username}</h2>
            <span className="text-sm font-medium text-gray-500 mt-1 bg-white px-3 py-1 rounded-full border border-gray-200 shadow-sm">{t.memberNo}: {userProfile?.userNumber}</span>
            
            <div className="flex flex-wrap justify-center gap-2 mt-6">
              <button onClick={toggleFont} className="px-4 py-2 bg-white border border-gray-200 rounded-full text-xs font-bold shadow-sm hover:bg-gray-50 transition">
                {userProfile?.fontPreference === 'serif' ? t.fontMincho : t.fontGothic}
              </button>
              <button onClick={toggleLang} className="px-4 py-2 bg-white border border-gray-200 rounded-full text-xs font-bold shadow-sm hover:bg-gray-50 transition flex items-center gap-1">
                <Languages className="w-4 h-4" />
                {t.langSetting}
              </button>
              <button onClick={() => setIsEditingSettings(!isEditingSettings)} className="p-2 bg-white border border-gray-200 rounded-full text-sm shadow-sm hover:bg-gray-50 transition">
                <Settings className="w-4 h-4 text-gray-600" />
              </button>
            </div>
          </div>

          {isEditingSettings && (
            <div className="p-5 border-b border-gray-100 bg-gray-100">
              <h3 className="font-bold text-sm mb-2">Gemini API Key</h3>
              <div className="flex gap-2">
                <input type="password" value={apiKeyInput} onChange={(e) => setApiKeyInput(e.target.value)} className="flex-1 p-2 text-sm rounded border border-gray-300 outline-none" placeholder="AIzaSy..." />
                <button onClick={saveSettings} className="bg-black text-white px-4 py-2 rounded text-sm font-bold">Save</button>
              </div>
            </div>
          )}

          <div className="flex-1">
            <div className="px-5 py-4 border-b border-gray-100 sticky top-0 bg-white/90 backdrop-blur-md z-10">
              <h3 className="font-bold text-gray-800">{t.myPosts}</h3>
            </div>
            {posts.length === 0 ? (
              <div className="p-8 text-center text-gray-400">{t.noPosts}</div>
            ) : (
              posts.sort((a, b) => b.createdAt - a.createdAt).map(post => (
                <div key={post.id} className="border-b border-gray-100 p-5 hover:bg-gray-50 transition cursor-pointer" onClick={() => onPostClick(post)}>
                  <div className="flex justify-between items-baseline mb-2">
                    <h4 className="font-bold text-sm">{post.author}</h4>
                    <AgeDisplay relative={post.estimatedAge_relative} absolute={post.estimatedAge_absolute} />
                  </div>
                  <p className="text-gray-800 text-[15px] truncate">{lang === 'ja' ? (post.ja_text || post.content) : (post.en_text || post.content)}</p>
                  <div className="flex items-center justify-end mt-2">
                    <Heart className="w-4 h-4 text-red-500 fill-red-500 mr-1" />
                    <span className="text-xs text-gray-500 font-medium">{post.likes || 0}</span>
                  </div>
                </div>
              ))
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
